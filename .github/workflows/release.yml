name: Build and Release Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    permissions:
      contents: write # פותר את שגיאת ה-403

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Windows
        run: flutter build windows --release

      - name: Compile Inno Setup
        shell: pwsh
        run: |
          # ISCC הוא ה-Compiler של Inno Setup שנמצא בנתיב המערכת ב-GitHub
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          # כאן אנחנו מעלים את קובץ ההתקנה שנוצר
        files: build/windows/x64/runner/Release/ChordBookSetup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}